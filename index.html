<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f2f5; min-height: 100vh; color: #1a1a2e;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 36px 20px 60px; }

  .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
  .topbar h1 { font-size: 1.4rem; font-weight: 700; color: #1a237e; letter-spacing: 0.02em; }
  .topbar .spacer { flex: 1; }

  .btn {
    padding: 10px 20px; border-radius: 12px; border: none; font-size: 0.9rem;
    font-weight: 600; cursor: pointer; transition: all 0.18s; letter-spacing: 0.02em; font-family: inherit;
  }
  .btn-ghost { background: #eef0fb; color: #3949ab; }
  .btn-ghost:hover { background: #dde0f5; }
  .btn-outline { background: white; color: #3949ab; border: 1.5px solid #c5cae9; }
  .btn-outline:hover { background: #eef0fb; }

  .view { display: none; }
  .view.active { display: block; }

  /* Library */
  .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 18px; }
  .deck-tile {
    background: #1a237e; border-radius: 20px; padding: 22px; min-height: 150px; cursor: pointer;
    position: relative; display: flex; flex-direction: column;
    box-shadow: 0 6px 24px rgba(26,35,126,0.22); transition: transform 0.18s, box-shadow 0.18s; overflow: hidden;
  }
  .deck-tile:hover { transform: translateY(-4px); box-shadow: 0 12px 34px rgba(26,35,126,0.32); }
  .deck-tile::after { content: ""; position: absolute; right: -30px; bottom: -30px; width: 110px; height: 110px; background: rgba(255,255,255,0.06); border-radius: 50%; }
  .deck-tile .dt-name { font-size: 1.15rem; font-weight: 700; color: #fff; line-height: 1.35; word-break: break-word; }
  .deck-tile .dt-count { margin-top: auto; font-size: 0.82rem; color: #c5cae9; font-weight: 500; z-index: 1; }
  .lib-empty { text-align: center; color: #999; padding: 30px 0; font-size: 0.95rem; }

  /* Study */
  .study-head { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .study-head .st-title { font-size: 1.15rem; font-weight: 700; color: #1a237e; }
  .study-head .counter { font-size: 0.9rem; color: #888; font-weight: 500; }
  .study-head .spacer { flex: 1; }

  .card-scene { width: 100%; max-width: 520px; height: 320px; perspective: 1200px; cursor: pointer; margin: 0 auto 20px; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.45,0.05,0.55,0.95); border-radius: 24px; }
  .card-scene.flipped .card-inner { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: 24px; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px; text-align: center; }
  .card-front { background: #1a237e; box-shadow: 0 8px 40px rgba(26,35,126,0.35); }
  .card-back { background: #ffffff; transform: rotateY(180deg); box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
  .card-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 18px; opacity: 0.5; }
  .card-front .card-label { color: #c5cae9; }
  .card-back .card-label { color: #9fa8b5; }
  .card-text { font-size: 1.5rem; font-weight: 600; line-height: 1.45; }
  .card-front .card-text { color: #fff; }
  .card-back .card-text { color: #1a1a2e; }
  .card-hint { font-size: 0.78rem; color: #7986cb; margin-top: 14px; animation: pulse-hint 2.5s ease-in-out infinite; }
  @keyframes pulse-hint { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

  .nav-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 18px; }
  .nav-btn { background: white; border: none; border-radius: 50%; width: 46px; height: 46px; font-size: 1.2rem; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: all 0.15s; display: flex; align-items: center; justify-content: center; color: #1a237e; }
  .nav-btn:hover:not(:disabled) { box-shadow: 0 4px 14px rgba(0,0,0,0.15); transform: scale(1.05); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 520px; margin: 0 auto; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #dde0f5; transition: background 0.2s; cursor: pointer; }
  .dot.active { background: #1a237e; }
  .dot.seen { background: #9fa8da; }

  .loading { text-align: center; color: #999; padding: 60px 0; font-size: 1rem; }
</style>
</head>
<body>
<div class="wrap">

  <div class="view active" id="view-library">
    <div class="topbar"><h1>✦ Flashcards</h1></div>
    <div id="libBody"><div class="loading">Loading…</div></div>
  </div>

  <div class="view" id="view-study">
    <div class="topbar">
      <button class="btn btn-ghost" onclick="goLibrary()">← Back</button>
      <div class="spacer"></div>
      <button class="btn btn-outline" onclick="shuffle()">⇄ Shuffle</button>
    </div>
    <div class="study-head">
      <span class="st-title" id="studyTitle"></span>
      <span class="counter" id="studyCounter"></span>
    </div>
    <div class="card-scene" id="cardScene" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-face card-front">
          <span class="card-label">Question</span>
          <div class="card-text" id="cardFront"></div>
          <span class="card-hint">Click to flip and see the answer</span>
        </div>
        <div class="card-face card-back">
          <span class="card-label">Answer</span>
          <div class="card-text" id="cardBack"></div>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹</button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">›</button>
    </div>
    <div class="dots" id="dots"></div>
  </div>

</div>

<script>
  let decks = [];

  // Load deck data. Cache-bust so updates show without hard refresh.
  fetch('decks.json?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => { decks = Array.isArray(data) ? data : []; renderLibrary(); })
    .catch(err => {
      document.getElementById('libBody').innerHTML =
        '<div class="lib-empty">Could not load decks.<br><small>' + err.message + '</small></div>';
    });

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }
  function goLibrary() { showView('view-library'); }

  function renderLibrary() {
    const body = document.getElementById('libBody');
    if (!decks.length) { body.innerHTML = '<div class="lib-empty">No decks published yet.</div>'; return; }
    let html = '<div class="deck-grid">';
    decks.forEach((d, i) => {
      const n = (d.cards || []).length;
      html += `<div class="deck-tile" onclick="studyDeck(${i})">
        <div class="dt-name">${escHtml(d.name)}</div>
        <div class="dt-count">${n} card${n === 1 ? '' : 's'}</div>
      </div>`;
    });
    html += '</div>';
    body.innerHTML = html;
  }

  let studyCards = [], current = 0, seen = new Set();

  function studyDeck(i) {
    const d = decks[i];
    studyCards = (d.cards || []).slice();
    if (!studyCards.length) return;
    current = 0; seen = new Set();
    document.getElementById('studyTitle').textContent = d.name;
    showView('view-study');
    renderCard();
  }

  function renderCard() {
    const c = studyCards[current];
    seen.add(current);
    document.getElementById('cardScene').classList.remove('flipped');
    document.getElementById('cardFront').innerHTML = escHtml(c.question || '(empty)');
    document.getElementById('cardBack').innerHTML = escHtml(c.answer || '(empty)');
    document.getElementById('studyCounter').textContent = `${current + 1} / ${studyCards.length}`;
    document.getElementById('prevBtn').disabled = current === 0;
    document.getElementById('nextBtn').disabled = current === studyCards.length - 1;
    document.getElementById('dots').innerHTML = studyCards.map((_, i) => {
      let cls = 'dot'; if (i === current) cls += ' active'; else if (seen.has(i)) cls += ' seen';
      return `<div class="${cls}" onclick="jumpTo(${i})"></div>`;
    }).join('');
  }

  function flipCard() { document.getElementById('cardScene').classList.toggle('flipped'); }
  function navigate(dir) { current = Math.max(0, Math.min(studyCards.length - 1, current + dir)); renderCard(); }
  function jumpTo(i) { current = i; renderCard(); }
  function shuffle() {
    for (let i = studyCards.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [studyCards[i], studyCards[j]] = [studyCards[j], studyCards[i]]; }
    current = 0; seen = new Set(); renderCard();
  }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('view-study').classList.contains('active')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  });
</script>
</body>
</html>
